name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: laravue_testing
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U laravel -d laravue_testing"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_pgsql, pgsql
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment Files
        run: |
          cp .env.example .env
          cp .env.testing.example .env.testing

      - name: Generate Application Key
        run: php artisan key:generate --force

      - name: Sync APP_KEY into .env.testing and point DB host to CI Postgres
        run: |
          KEY=$(grep -E '^APP_KEY=' .env | cut -d= -f2-)
          sed -i "s|^APP_KEY=.*|APP_KEY=${KEY}|" .env.testing
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env.testing

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/pest --compact
